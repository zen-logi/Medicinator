services:
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    image: medicinator-api:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      Auth__FirebaseProjectId: ${FIREBASE_PROJECT_ID:-}
      Cors__AllowedOrigins__0: ${MEDICINATOR_FRONTEND_ORIGIN:-https://medicinator.example.pages.dev}
      ConnectionStrings__DefaultConnection: ${MEDICINATOR_DB_CONNECTION:-Data Source=/data/medicinator.db}
      Database__ApplyMigrationsOnStartup: ${MEDICINATOR_APPLY_MIGRATIONS_ON_STARTUP:-true}
    ports:
      - "8080:8080"
    volumes:
      - medicinator-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  medicinator-data:
